---
- name: Check if yay is installed with pacman
  ansible.builtin.command: pacman -Q yay
  register: yay_pacman
  changed_when: false
  failed_when: false

- name: Clone yay (only if not installed)
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay-bin.git
    dest: "{{ srcdir }}/yay"
    update: true
  when: yay_pacman.rc != 0

- name: Build and install yay (only if not installed)
  ansible.builtin.command:
    chdir: "{{ srcdir }}/yay"
    cmd: "makepkg -sfi --noconfirm"
  when: yay_pacman.rc != 0

- name: Install pacman packages
  become: yes
  community.general.pacman:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ pacman_packages }}"
  tags: pacman

- name: Create the `aur_builder` user
  become: yes
  ansible.builtin.user:
    name: aur_builder
    create_home: yes
    group: wheel
  tags: aur

- name: Allow the `aur_builder` user to run `sudo pacman` without a password
  become: yes
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: 'aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
    create: yes
    mode: 0644
    validate: 'visudo -cf %s'
  tags: aur

- name: Importer la clé PGP Mullvad via WKD (recommandé)
  become: yes
  become_user: aur_builder
  ansible.builtin.command:
    cmd: gpg --auto-key-locate nodefault,wkd --locate-keys torbrowser@torproject.org
  changed_when: false
  failed_when: false
  tags: aur

- name: Installer paquets AUR avec yay (idempotent)
  kewlfft.aur.aur:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ aur_packages }}"
  become: yes
  become_user: aur_builder
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tags: aur

- name: Install flatpak packages
  community.general.flatpak:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
  become: no
  loop: "{{ flatpak_packages }}"
  tags: flatpak
